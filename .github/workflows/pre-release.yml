name: Beta release automatica

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

jobs:
  pre-release:
    name: Crea pre-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leggi versione da manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/myopel/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Elimina beta di versioni precedenti
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_PREFIX="v${{ steps.version.outputs.version }}-beta."
          OLD_TAGS=$(gh release list --limit 100 --json tagName,isPrerelease \
            -q ".[] | select(.isPrerelease) | select(.tagName | test(\"-beta\\.\")) | select(.tagName | startswith(\"${CURRENT_PREFIX}\") | not) | .tagName" \
            2>/dev/null || true)
          for TAG in $OLD_TAGS; do
            echo "Elimino beta vecchia: ${TAG}"
            gh release delete "${TAG}" --yes 2>/dev/null || true
            git push origin --delete "${TAG}" 2>/dev/null || true
          done

      - name: Calcola prossimo numero beta
        id: beta_num
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREFIX="v${{ steps.version.outputs.version }}-beta."
          LAST=$(gh release list --limit 100 --json tagName,isPrerelease \
            -q ".[] | select(.isPrerelease) | select(.tagName | startswith(\"${PREFIX}\")) | .tagName" \
            2>/dev/null | sed 's/.*-beta\.//' | sort -n | tail -1)
          echo "num=$((${LAST:-0} + 1))" >> "$GITHUB_OUTPUT"

      - name: Crea archivio myopel-ha.zip
        run: |
          cd custom_components
          zip -r ../myopel-ha.zip myopel/
          cd ..

      - name: Crea note di rilascio
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          cat > /tmp/beta_notes.md << NOTES
          Beta automatica dal branch \`${BRANCH}\`

          > Questa e' una pre-release di sviluppo, non usarla in produzione.

          **Installazione manuale HACS:**
          1. Scarica \`myopel-ha.zip\`
          2. Estrai la cartella \`myopel\` in \`config/custom_components/\`
          3. Riavvia Home Assistant
          NOTES

      - name: Crea pre-release GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}-beta.${{ steps.beta_num.outputs.num }}"
          gh release create "${TAG}" \
            myopel-ha.zip \
            --title "${TAG}" \
            --notes-file /tmp/beta_notes.md \
            --prerelease \
            --target "${{ github.sha }}"
